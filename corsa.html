<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0a0e16">
<meta name="robots" content="noindex,nofollow">
<title>TURBO CORSA</title>
<meta property="og:type" content="website">
<meta property="og:title" content="🏎️ TURBO CORSA">
<meta property="og:description" content="Schiva il traffico a tutta velocità. Insert coin!">
<meta property="og:image" content="https://alessandrovizzini1986-a11y.github.io/barcellona-40/og-corsa.jpg?v=1">
<meta property="og:image:width" content="1200"><meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://alessandrovizzini1986-a11y.github.io/barcellona-40/og-corsa.jpg?v=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:radial-gradient(120% 70% at 50% 0%,#16233f,#06080f 70%);color:#e7eaf6;
    font-family:"Press Start 2P",monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100svh;overflow:hidden;padding:8px;user-select:none;-webkit-user-select:none}
  .top{position:fixed;top:calc(8px + env(safe-area-inset-top));left:0;right:0;display:flex;justify-content:space-between;padding:0 14px;font-size:8px;z-index:10}
  .top a{color:#8b93b0;text-decoration:none}
  .arena{width:min(96vw,380px)}
  .hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:9px;color:#7fd0ff}
  .stage{position:relative;border-radius:14px;overflow:hidden;border:1px solid rgba(120,160,220,.3);box-shadow:0 24px 60px -26px #000}
  canvas{display:block;width:100%;height:auto;background:#10202f}
  .ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;text-align:center;background:rgba(6,8,15,.84);padding:16px}
  .ov.hide{display:none}
  .ov .big{font-size:20px;color:#7fd0ff;line-height:1.5}
  .ov .sm{font-size:8px;line-height:1.9;color:#cfd6ee}
  .ov .blink{animation:bk 1s steps(1) infinite;color:#ffd28a}@keyframes bk{50%{opacity:0}}
  .softrow{display:flex;gap:8px;margin-top:12px;width:min(96vw,380px)}
  .soft{flex:1;font-family:inherit;font-size:7px;color:#cdd8e4;padding:11px 0;border-radius:11px;border:1px solid rgba(255,255,255,.08);
    background:linear-gradient(180deg,#1c3a58,#102a42);cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.4)}
  .soft:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.4)}.soft.off{opacity:.55}
  .ctrl{display:flex;gap:12px;margin-top:10px;width:min(96vw,380px)}
  .ctrl button{flex:1;font-family:inherit;font-size:18px;color:#e7ebff;padding:18px 0;border-radius:14px;border:1px solid rgba(255,255,255,.08);
    background:linear-gradient(180deg,#21426a,#132a44);cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.45)}
  .ctrl button:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.45)}
  .hint{margin-top:9px;font-size:7px;color:#6f76a0;text-align:center;line-height:1.9}
</style>
</head>
<body>
<div class="top"><a href="sala-giochi.html">‹ SALA GIOCHI</a><a href="cena-bibo-9k2x.html">ESCI</a></div>
<div class="arena">
  <div class="hud"><span id="scoreLbl">PUNTI 0</span><span id="livesLbl">🚗×3</span><span id="hiLbl">REC 0</span></div>
  <div class="stage">
    <canvas id="cv" width="320" height="540"></canvas>
    <div class="ov" id="splash"><div class="big">TURBO<br>CORSA</div><div class="sm">schiva il traffico 🚗💨<br>record <span id="hiS">0</span></div><div class="sm blink">★ INSERT COIN ★</div></div>
    <div class="ov hide" id="over"><div class="big">CRASH!</div><div class="sm">punti <span id="finalSc">0</span></div><div class="sm blink">★ INSERT COIN ★</div></div>
    <div class="ov hide" id="pause"><div class="big">PAUSA</div><div class="sm blink">▶ RIPRENDI</div></div>
  </div>
</div>
<div class="softrow">
  <button class="soft" id="mBtn">MUSICA ON</button><button class="soft" id="sBtn">SUONI ON</button>
  <button class="soft" id="pauseBtn">PAUSA</button><button class="soft" id="okBtn">PLAY</button>
</div>
<div class="ctrl"><button id="bL">◀</button><button id="bR">▶</button></div>
<div class="hint">trascina · ◀ ▶ · frecce · niente freni 🏁</div>
<script src="arcade.js"></script>
<script>
(function(){
  var KEY='corsa';
  var cv=document.getElementById('cv'), ctx=cv.getContext('2d'), W=cv.width, H=cv.height;
  var RX=34, RW=W-68;                 // road bounds
  var ENE=['🚙','🚕','🚓','🚚','🚐'];
  var player, cars, score, lives, state, spawnT, spawnMs, spd, dash, last, move, inv;

  function setHud(){
    document.getElementById('scoreLbl').textContent='PUNTI '+(score||0);
    document.getElementById('livesLbl').textContent='🚗×'+Math.max(0,lives||0);
    var b=Arcade.best(KEY), n=Arcade.bestName(KEY);
    document.getElementById('hiLbl').textContent='REC '+b+(n?' '+n:'');
  }
  function reset(){ player={x:W/2,y:H-70,w:38,h:60}; cars=[]; score=0; lives=3; spd=240; spawnMs=820; spawnT=0; dash=0; move=0; inv=0; setHud(); }
  function show(id){ ['splash','over','pause'].forEach(function(s){document.getElementById(s).classList.toggle('hide',s!==id);}); }
  function hideOv(){ ['splash','over','pause'].forEach(function(s){document.getElementById(s).classList.add('hide');}); }
  function start(){ reset(); state='play'; hideOv(); Arcade.musicStart(); Arcade.sfx(880,.06);setTimeout(function(){Arcade.sfx(1320,.1);},90); last=performance.now(); requestAnimationFrame(loop); }
  function togglePause(){ if(state==='play'){state='pause';show('pause');Arcade.musicStop();} else if(state==='pause'){state='play';hideOv();Arcade.musicStart();last=performance.now();requestAnimationFrame(loop);} }
  function action(){ Arcade.ctx(); if(state==='play'||state==='pause') togglePause(); else start(); }
  function over(){ state='over'; Arcade.musicStop(); Arcade.sfx(180,.2);setTimeout(function(){Arcade.sfx(90,.3);},120);
    document.getElementById('finalSc').textContent=score;
    if(Arcade.isHigh(KEY,score)){ Arcade.nameEntry(score,function(n){ Arcade.addScore(KEY,n,score); setHud(); }); }
    setHud(); show('over'); }

  function spawn(){ var lane=RX+18+Math.random()*(RW-72); cars.push({x:lane,y:-60,w:38,h:60,e:ENE[(Math.random()*ENE.length)|0],passed:false}); }
  function hit(a,b){ return Math.abs(a.x-b.x)<(a.w+b.w)/2-10 && Math.abs(a.y-b.y)<(a.h+b.h)/2-10; }

  function loop(t){
    if(state!=='play')return; var dt=Math.min(.05,(t-last)/1000); last=t;
    player.x+=move*300*dt; if(player.tx!=null) player.x+=(player.tx-player.x)*Math.min(1,dt*16);
    player.x=Math.max(RX+player.w/2,Math.min(RX+RW-player.w/2,player.x));
    spd=240+score*1.4; dash+=spd*dt; spawnMs=Math.max(420,820-score*4); spawnT+=dt*1000;
    if(spawnT>=spawnMs){spawnT=0;spawn();}
    if(inv>0) inv-=dt;
    for(var i=cars.length-1;i>=0;i--){ var c=cars[i]; c.y+=(spd*0.7+90)*dt;
      if(!c.passed && c.y>player.y+40){ c.passed=true; score+=5; setHud(); }
      if(inv<=0 && hit(player,c)){ cars.splice(i,1); lives--; inv=1.3; Arcade.sfx(140,.25,'sawtooth'); if(lives<=0){over();return;} setHud(); continue; }
      if(c.y>H+60) cars.splice(i,1);
    }
    score+=dt*8|0; // distanza
    draw();
    requestAnimationFrame(loop);
  }
  function draw(){
    // grass + road
    ctx.fillStyle='#16331c'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#2b2f36'; ctx.fillRect(RX,0,RW,H);
    ctx.fillStyle='#6b7280'; ctx.fillRect(RX-4,0,4,H); ctx.fillRect(RX+RW,0,4,H);
    // lane dashes
    ctx.fillStyle='#e7c84a'; var off=dash%48;
    for(var ln=1;ln<3;ln++){ var lx=RX+RW*ln/3-3; for(var y=-48+off;y<H;y+=48){ ctx.fillRect(lx,y,6,26); } }
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='46px serif';
    for(var i=0;i<cars.length;i++) ctx.fillText(cars[i].e,cars[i].x,cars[i].y);
    if(!(inv>0 && ((inv*10)|0)%2)) ctx.fillText('🚗',player.x,player.y);
  }
  // controls
  function px(clientX){ var r=cv.getBoundingClientRect(); return (clientX-r.left)/r.width*W; }
  cv.addEventListener('pointerdown',function(e){ if(state==='play') player.tx=px(e.clientX); },{passive:true});
  cv.addEventListener('pointermove',function(e){ if(state==='play'&&(e.buttons||e.pointerType==='touch')) player.tx=px(e.clientX); },{passive:true});
  cv.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
  function hold(btn,v){ btn.addEventListener('pointerdown',function(e){e.preventDefault();player.tx=null;move=v;});
    ['pointerup','pointerleave','pointercancel'].forEach(function(ev){btn.addEventListener(ev,function(){move=0;});}); }
  hold(document.getElementById('bL'),-1); hold(document.getElementById('bR'),1);
  document.getElementById('okBtn').addEventListener('click',action);
  document.getElementById('pauseBtn').addEventListener('click',function(){ Arcade.ctx(); if(state==='play'||state==='pause') togglePause(); });
  Arcade.bindAudioButtons('mBtn','sBtn');
  addEventListener('keydown',function(e){ var k=e.key.toLowerCase(); if(['arrowleft','arrowright',' '].indexOf(k)>=0)e.preventDefault();
    if(k==='arrowleft'||k==='a'){player.tx=null;move=-1;} else if(k==='arrowright'||k==='d'){player.tx=null;move=1;}
    else if(k==='p'){ if(state==='play'||state==='pause') togglePause(); } else if(k===' '||k==='enter') action(); });
  addEventListener('keyup',function(e){ var k=e.key.toLowerCase(); if(k==='arrowleft'||k==='arrowright'||k==='a'||k==='d') move=0; });
  reset(); state='idle'; draw(); document.getElementById('hiS').textContent=Arcade.best(KEY); show('splash');
})();
</script>
</body>
</html>
