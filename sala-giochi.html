<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#06060d">
<meta name="robots" content="noindex,nofollow">
<title>SALA GIOCHI</title>
<meta property="og:type" content="website">
<meta property="og:title" content="🕹️ SALA GIOCHI">
<meta property="og:description" content="Snake, Tetris, Pac-Man, Space Invaders, Turbo Corsa, Puzzle Bobble e Fiorentina Run. Insert coin!">
<meta property="og:image" content="https://alessandrovizzini1986-a11y.github.io/barcellona-40/og-arcade.jpg?v=2">
<meta property="og:image:width" content="1200"><meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://alessandrovizzini1986-a11y.github.io/barcellona-40/og-arcade.jpg?v=2">
<meta property="og:locale" content="it_IT">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:radial-gradient(120% 80% at 50% 0%,#2a1456,#06060d 68%);color:#e7eaf6;
    font-family:"Press Start 2P",monospace;min-height:100svh;display:flex;flex-direction:column;align-items:center;
    padding:calc(28px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom))}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:50;background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0 2px,transparent 2px 4px)}
  .head{text-align:center}
  .head h1{font-size:clamp(20px,7vw,32px);line-height:1.4;color:#fff;text-shadow:0 0 18px rgba(180,140,255,.6),0 3px 0 #6a3df0}
  .head .coin{margin-top:12px;font-size:9px;color:#ffd28a;animation:bk 1.1s steps(1) infinite}
  @keyframes bk{50%{opacity:.25}}
  .grid{width:min(94vw,460px);display:flex;flex-direction:column;gap:12px;margin-top:20px}
  .game{position:relative;display:block;height:110px;border-radius:14px;overflow:hidden;text-decoration:none;
    border:1px solid rgba(150,160,230,.3);box-shadow:0 16px 40px -20px #000;background-size:cover;background-position:center;transition:transform .15s}
  .game:active{transform:scale(.98)}
  .game::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,6,13,.9),rgba(6,6,13,.4) 70%,transparent)}
  .game .info{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;gap:7px;padding:0 18px}
  .game .nm{font-size:14px;color:#fff;text-shadow:0 2px 6px #000}
  .game .tg{font-size:7px;color:#cdd3ee}
  .game .rec{font-size:7px;color:#ffd28a}
  .game .go{position:absolute;right:16px;top:50%;transform:translateY(-50%);z-index:2;font-size:20px;color:#fff;text-shadow:0 0 10px rgba(255,255,255,.5)}
  .foot{margin-top:24px;font-size:8px}.foot a{color:#8b93b0;text-decoration:none}
</style>
</head>
<body>
  <div class="head"><h1>SALA<br>GIOCHI</h1><div class="coin">★ INSERT COIN ★</div></div>
  <div class="grid" id="grid"></div>
  <div class="foot"><a href="cena-bibo-9k2x.html">‹ torna alla cena 🥩</a></div>
<script src="arcade.js"></script>
<script>
  var GAMES=[
    {f:'snake-3310.html',k:'snake',og:'og-snake.jpg',n:'SNAKE',t:'Nokia 3310 · il classico'},
    {f:'tetris.html',k:'tetris',og:'og-tetris.jpg',n:'TETRIS',t:'incastra i blocchi'},
    {f:'pacman.html',k:'pacman',og:'og-pacman.jpg',n:'PAC-MAN',t:'pallini & fantasmi'},
    {f:'invaders.html',k:'invaders',og:'og-invaders.jpg',n:'SPACE INVADERS',t:'difendi la Terra'},
    {f:'corsa.html',k:'corsa',og:'og-corsa.jpg',n:'TURBO CORSA',t:'schiva il traffico'},
    {f:'puzzle-bobble.html',k:'bobble',og:'og-bobble.jpg',n:'PUZZLE BOBBLE',t:'bolle da 3+'},
    {f:'fiorentina-run.html',k:'fiorun',og:'og-run.jpg',n:'FIORENTINA RUN',t:'carne sì, insalata no'},
    {f:'rigori.html',k:'rigori',og:'og-rigori.jpg',n:'RIGORI AL CAMP NOU',t:'segna di fila ⚽'},
    {f:'scacchi.html',k:'scacchi',og:'og-scacchi.jpg',n:'SCACCHI',t:'sfida la CPU ♟️'}
  ];
  function legacy(k){ var m={snake:'snake_hi',tetris:'tetris_hi',fiorun:'fiorun_hi'}; if(m[k]){ try{return parseInt(localStorage.getItem(m[k])||'0',10)||0;}catch(e){} } return 0; }
  document.getElementById('grid').innerHTML=GAMES.map(function(g){
    var b=Math.max(Arcade.best(g.k),legacy(g.k)), nm=Arcade.bestName(g.k);
    var rec=b>0?('record: '+b+(nm?' · '+nm:'')):'gioca per primo!';
    return '<a class="game" href="'+g.f+'" style="background-image:url('+g.og+'?v=2)">'+
      '<div class="info"><span class="nm">'+g.n+'</span><span class="tg">'+g.t+'</span><span class="rec">'+rec+'</span></div>'+
      '<span class="go">▶</span></a>';
  }).join('');
</script>
</body>
</html>
