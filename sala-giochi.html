<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<meta property="og:title" content="🕹️ SALA GIOCHI">
<meta property="og:description" content="Snake, Tetris e Fiorentina Run. Insert coin e torna negli anni '90.">

<meta property="og:image:height" content="630">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:radial-gradient(120% 80% at 50% 0%,#1a1340,#06060d 68%);color:#e7eaf6;
    font-family:"Press Start 2P",monospace;min-height:100svh;display:flex;flex-direction:column;align-items:center;
    padding:calc(30px + env(safe-area-inset-top)) 16px calc(30px + env(safe-area-inset-bottom));overflow-x:hidden}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0 2px,transparent 2px 4px)}
  .head{text-align:center;margin-bottom:6px}
  .head h1{font-size:clamp(20px,7vw,32px);color:#a99bff;line-height:1.4;text-shadow:0 0 18px rgba(140,120,255,.5)}
  .head .coin{margin-top:14px;font-size:9px;color:#ffd28a;animation:bk 1.1s steps(1) infinite}
  @keyframes bk{50%{opacity:.25}}
  .grid{width:min(94vw,440px);display:flex;flex-direction:column;gap:14px;margin-top:22px}
  .game{position:relative;display:block;height:128px;border-radius:14px;overflow:hidden;text-decoration:none;
    border:1px solid rgba(150,160,230,.3);box-shadow:0 16px 40px -20px #000,inset 0 0 30px rgba(120,120,255,.1);
    background-size:cover;background-position:center;transition:transform .15s,box-shadow .2s}
  .game:active{transform:scale(.98)}
  .game::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,6,13,.86),rgba(6,6,13,.35) 70%,transparent)}
  .game .info{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;gap:8px;padding:0 18px}
  .game .nm{font-size:15px;color:#fff;text-shadow:0 2px 6px #000}
  .game .tg{font-size:7.5px;color:#cdd3ee;letter-spacing:.04em}
  .game .rec{font-size:7.5px;color:#ffd28a}
  .game .go{position:absolute;right:16px;top:50%;transform:translateY(-50%);z-index:2;font-size:20px;color:#fff;
    text-shadow:0 0 10px rgba(255,255,255,.5)}
  .foot{margin-top:26px;font-size:8px}
  .foot a{color:#8b93b0;text-decoration:none}
</style>
</head>
<body>
  <div class="head">
    <h1>SALA<br>GIOCHI</h1>
    <div class="coin">★ INSERT COIN ★</div>
  </div>

  <div class="grid">
    <a class="game" href="snake-3310.html" style="background-image:url(og-snake.jpg?v=1)">
      <div class="info"><span class="nm">SNAKE</span><span class="tg">Nokia 3310 · il classico</span><span class="rec" data-k="snake_hi"></span></div>
      <span class="go">▶</span>
    </a>
    <a class="game" href="tetris.html" style="background-image:url(og-tetris.jpg?v=1)">
      <div class="info"><span class="nm">TETRIS</span><span class="tg">incastra i blocchi · fai le righe</span><span class="rec" data-k="tetris_hi"></span></div>
      <span class="go">▶</span>
    </a>
    <a class="game" href="fiorentina-run.html" style="background-image:url(og-run.jpg?v=1)">
      <div class="info"><span class="nm">FIORENTINA RUN</span><span class="tg">acchiappa la carne · schiva l'insalata</span><span class="rec" data-k="fiorun_hi"></span></div>
      <span class="go">▶</span>
    </a>
  </div>

  <div class="foot"><a href="cena-bibo-9k2x.html">‹ torna alla cena 🥩</a></div>

<script>
  document.querySelectorAll('.rec').forEach(function(el){
    var v=parseInt(localStorage.getItem(el.dataset.k)||'0',10)||0;
    el.textContent='record: '+v;
  });
</script>
</body>
</html>
