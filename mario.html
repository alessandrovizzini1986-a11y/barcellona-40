<!DOCTYPE html>
<html lang="it">
<head>

<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&family=DM+Sans:opsz,wght@9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--coral:#ff7a4d;--gold:#ffd486;--grad:linear-gradient(100deg,#ff5e2e,#ff9a3d 45%,#ffd486)}
  html,body{height:100%;background:#08080b;color:#f3ede3;font-family:"DM Sans",system-ui,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
  /* poster SEMPRE come sfondo: niente schermo nero se il video non parte */
  .stage{position:fixed;inset:0;background:#08080b center/cover no-repeat;background-image:url(mario_poster.jpg)}
  #v{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:transparent}
  .scrim{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(180deg,rgba(8,8,11,.55) 0%,rgba(8,8,11,0) 22%,rgba(8,8,11,0) 52%,rgba(8,8,11,.82) 100%)}
  .tap{position:fixed;inset:0;z-index:2}
  /* progress video in alto */
  .pbar{position:fixed;top:0;left:0;right:0;z-index:5;height:3px;background:rgba(255,255,255,.16)}
  .pbar i{display:block;height:100%;width:0;background:var(--grad);box-shadow:0 0 10px rgba(255,138,77,.6);transition:width .15s linear}
  .ui{position:fixed;inset:0;z-index:3;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
  .top{display:flex;justify-content:space-between;align-items:center;padding:calc(16px + env(safe-area-inset-top)) 18px 14px}
  .brand{display:flex;align-items:center;gap:8px;font-family:"Fraunces",serif;font-weight:600;font-size:16px;text-shadow:0 2px 14px rgba(0,0,0,.7)}
  .crest{width:17px;height:21px;border-radius:2px 2px 9px 9px;background:linear-gradient(90deg,#004D98 0 50%,#A50044 50% 100%);box-shadow:0 2px 6px rgba(0,0,0,.5)}
  .mute{pointer-events:auto;background:rgba(0,0,0,.42);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.22);color:#fff;font-family:inherit;font-weight:700;font-size:13px;padding:8px 14px;border-radius:980px;cursor:pointer}
  
  .bottom{display:flex;flex-direction:column;align-items:center;gap:13px;padding:0 22px calc(30px + env(safe-area-inset-bottom))}
  .tag{font-family:"Fraunces",serif;font-weight:600;font-size:14px;letter-spacing:.02em;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .cta{pointer-events:auto;display:inline-flex;align-items:center;gap:8px;background:var(--grad);color:#08080b;font-weight:800;
    font-size:18px;padding:16px 34px;border-radius:980px;text-decoration:none;box-shadow:0 18px 50px -16px rgba(255,120,60,.75);white-space:nowrap}
  .cta .ar{transition:transform .2s}
  .cta:active .ar{transform:translateX(3px)}
  .skip{pointer-events:auto;color:rgba(255,255,255,.7);font-size:12.5px;letter-spacing:.04em;text-decoration:none}
  .hint{position:fixed;left:0;right:0;top:46%;z-index:3;text-align:center;color:rgba(255,255,255,.88);font-size:13.5px;
    letter-spacing:.04em;pointer-events:none;transition:opacity .5s;text-shadow:0 2px 10px rgba(0,0,0,.7)}
  .hint .pp{display:inline-flex;align-items:center;gap:7px;background:rgba(0,0,0,.4);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.22);border-radius:980px;padding:8px 15px}
  /* overlay finale: FOMO + doppia CTA */
  .end{position:fixed;inset:0;z-index:6;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    background:radial-gradient(120% 100% at 50% 38%,rgba(20,10,6,.9),rgba(8,8,11,.97));text-align:center;padding:0 30px;
    opacity:0;visibility:hidden;transition:opacity .5s}
  .end.on{opacity:1;visibility:visible}
  .end .ek{color:var(--coral);font-weight:700;font-size:12px;letter-spacing:.2em;text-transform:uppercase}
  .end h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(30px,9vw,46px);line-height:1.06;letter-spacing:-.02em}
  .end h1 em{font-style:italic;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .end p{color:rgba(255,255,255,.66);font-size:14.5px;max-width:28ch}
  .end .row{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:6px}
  .end .replay{pointer-events:auto;color:rgba(255,255,255,.6);font-size:13px;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.2);padding-bottom:2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="stage"></div>
<video id="v" playsinline autoplay muted preload="auto" poster="mario_poster.jpg">
  <source src="mario.mp4" type="video/mp4">
</video>
<div class="scrim"></div>
<div class="pbar"><i id="pb"></i></div>
<div class="tap" id="tap"></div>

<div class="hint" id="hint"><span class="pp">🔊 tocca per l'audio</span></div>
<div class="ui">
  <div class="top"><span class="brand"><span class="crest"></span>Mario · 104</span><button class="mute" id="mute">🔇 Audio</button></div>
  <div class="bottom">
    <span class="tag">#MésQueUnAle</span>
    <a class="cta" href="tour.html"><span>Scopri il tour</span><span class="ar">→</span></a>
    <a class="skip" href="tour.html">salta ⏭</a>
  </div>
</div>
<div class="end" id="end">
  <div class="ek">La rosa cresce</div>
  <h1>Benvenuto,<br><em>Mario! · #104</em></h1>
  <p>Uno in più a bordo. Il prossimo numero può essere il tuo. Ti porto al tour…</p>
  <div class="row">
    <a class="cta" href="tour.html"><span>Scopri il tour</span><span class="ar">→</span></a>
    <a class="replay" id="replay" href="#">↻ Rivedi il video</a>
  </div>
</div>
<script>
  const v=document.getElementById('v'), mute=document.getElementById('mute'), tap=document.getElementById('tap'),
        hint=document.getElementById('hint'), end=document.getElementById('end'), pb=document.getElementById('pb'),
        replay=document.getElementById('replay');
  let redirect;
  function setlbl(){ mute.textContent = v.muted ? '🔇 Audio' : '🔊 Audio'; }
  function unmute(){ v.muted=false; setlbl(); hint.style.opacity=0; if(v.paused)v.play().catch(()=>{}); }
  mute.addEventListener('click',e=>{ e.stopPropagation(); v.muted=!v.muted; setlbl(); hint.style.opacity=0; if(!v.muted&&v.paused)v.play().catch(()=>{}); });
  tap.addEventListener('click',()=>{ if(v.muted){ unmute(); return; } if(v.paused) v.play().catch(()=>{}); else v.pause(); });
  v.addEventListener('timeupdate',()=>{ if(v.duration) pb.style.width=(v.currentTime/v.duration*100)+'%'; });
  v.addEventListener('ended',()=>{ end.classList.add('on'); redirect=setTimeout(()=>{ location.href='tour.html'; }, 4200); });
  replay.addEventListener('click',e=>{ e.preventDefault(); clearTimeout(redirect); end.classList.remove('on'); v.currentTime=0; v.play().catch(()=>{}); });
  v.play().catch(()=>{});
  setTimeout(()=>{ hint.style.opacity=0; }, 4500);
</script>
</body>
</html>
